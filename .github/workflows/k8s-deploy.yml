name: AI SaaS Kubernetes Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Image
      run: |
        docker build -t ghcr.io/${{ github.repository }}/ai-saas:latest .

    - name: Push Image
      run: |
        docker push ghcr.io/${{ github.repository }}/ai-saas:latest

    - name: Deploy to Kubernetes
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.K8S_HOST }}
        username: ${{ secrets.K8S_USER }}
        key: ${{ secrets.K8S_SSH_KEY }}
        script: |
          kubectl rollout restart deployment ai-saas
