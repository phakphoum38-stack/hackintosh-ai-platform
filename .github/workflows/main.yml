name: AI EFI Full Pipeline

on:
  push:
    branches: ["main"]

jobs:
  ai-pipeline:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Train AI Model
      run: python -m backend.core.trainer

    - name: Create EFI folder
      run: mkdir -p EFI/OC

    - name: Build EFI
      run: python -c "from backend.builder.efi_builder import build_efi; build_efi({'cpu':'Intel','gpu':'Intel','acpi_score':70,'gpu_score':60,'usb_score':80})"

    - name: Run VM Test (mock)
      run: python -c "from vm.worker import run_qemu_boot; print(run_qemu_boot({'test':True}))"

    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: model
        path: models/latest.pth

    - name: Upload EFI
      uses: actions/upload-artifact@v4
      with:
        name: EFI
        path: EFI/
